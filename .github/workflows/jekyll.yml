# Name of the workflow shown in the GitHub Actions tab
name: Deploy Jekyll site to Pages

# Run this workflow automatically on pushes to main,
# and also allow it to be started manually from the Actions tab
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions needed for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build the Jekyll site
  build:
    runs-on: ubuntu-latest

    steps:
      # Download repository contents to the runner
      - name: Checkout
        uses: actions/checkout@v4

      # Install Ruby and bundle gems from the Jekyll project folder
      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: "3.3"
          bundler-cache: true
          cache-version: 0
          working-directory: macbook-neo-jekyll-v3

      # Configure Pages environment and base path
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Build the Jekyll site from the subfolder
      - name: Build with Jekyll
        working-directory: macbook-neo-jekyll-v3
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      # Upload the generated _site folder as the Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: macbook-neo-jekyll-v3/_site

  # Deploy the built artifact to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4